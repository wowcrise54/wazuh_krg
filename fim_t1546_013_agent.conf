<!--
  Centralized Wazuh agent configuration for MITRE ATT&CK T1546.013.

  Deploy the contents through:
    /var/ossec/etc/shared/<WINDOWS_GROUP>/agent.conf

  Wildcard paths cover every local Windows profile, including common OneDrive
  redirection. Wazuh evaluates wildcard paths during scheduled FIM scans.
-->
<agent_config os="Windows">
  <syscheck>
    <!-- Windows PowerShell 5.1 profile directories. -->
    <directories check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\*\Documents\WindowsPowerShell</directories>
    <directories check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\*\OneDrive*\Documents\WindowsPowerShell</directories>

    <!-- PowerShell 6/7+ profile directories. -->
    <directories check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\*\Documents\PowerShell</directories>
    <directories check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\*\OneDrive*\Documents\PowerShell</directories>

    <!--
      For realtime monitoring, add non-wildcard entries for known profiles.
      Replace USER and uncomment the entries below. Wildcard paths themselves
      are scheduled-scan only in Wazuh.

      <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\USER\Documents\WindowsPowerShell</directories>
      <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\USER\Documents\PowerShell</directories>
      <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\USER\OneDrive\Documents\WindowsPowerShell</directories>
      <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes" tags="mitre_t1546_013">C:\Users\USER\OneDrive\Documents\PowerShell</directories>
    -->
  </syscheck>
</agent_config>
