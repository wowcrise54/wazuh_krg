<!--
  Optional FIM coverage for modify_authentication_process_t1556_rules.xml.
  Deploy relevant blocks through /var/ossec/etc/shared/<GROUP>/agent.conf.
-->

<agent_config os="Linux">
  <syscheck>
    <!-- T1556.003: PAM configuration and module paths. -->
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/etc/pam.d</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/lib/security</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/lib64/security</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/usr/lib/security</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/usr/lib64/security</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/usr/lib/x86_64-linux-gnu/security</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_003">/usr/local/lib/security</directories>
  </syscheck>
</agent_config>

<agent_config os="Windows">
  <syscheck>
    <!-- T1556.007: AD FS configuration files. -->
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_007">C:\Windows\ADFS</directories>
    <directories check_all="yes" realtime="yes" whodata="yes" report_changes="yes" tags="mitre_t1556_007">C:\Program Files\Active Directory Federation Services</directories>
  </syscheck>
</agent_config>
