    rule_name:
        Type: string
        Name:
            en: "Correlation rule name"
            ru: "Название правила корреляции"
    user:
        Type: string
        Name:
            en: "ID of the user the correlated event is related to"
            ru: "Идентификатор пользователя, к которому относится скоррелированное событие"
    specific_value:
        Type: string
        Name:
            en: "Key information value of a correlated event"
            ru: "Значение ключевой информации скоррелированного события"
    host:
        Type: string
        Name:
            ru: "Узел, на котором произошло событие"
            en: "Host on which an event occurred"
