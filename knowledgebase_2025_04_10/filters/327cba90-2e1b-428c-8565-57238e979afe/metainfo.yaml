        ru: "Проверка ключевой информации скоррелированного события на присутствие в списке, разрешающем новые срабатывания правил корреляции для указанных значений, используя прямое сравнение значений"
        en: "A check for the presence of correlated event key information on the list that allows new triggerings of correlation rules for the specified values using the direct comparison of values"
