<!-- Deploy through /var/ossec/etc/shared/&lt;LINUX_GROUP&gt;/agent.conf. -->
<agent_config os="Linux">
  <syscheck>
    <!-- System-wide files: realtime and Who-data attribution. -->
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc/profile</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc/profile.d</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc/bash.bashrc</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc/bashrc</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc/zsh</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc/fish</directories>

    <!-- Wildcards cover local users during scheduled FIM scans. -->
    <directories check_all="yes" report_changes="yes">/home/*/.profile</directories>
    <directories check_all="yes" report_changes="yes">/home/*/.bash*</directories>
    <directories check_all="yes" report_changes="yes">/home/*/.zsh*</directories>
    <directories check_all="yes" report_changes="yes">/home/*/.config/fish</directories>
    <directories check_all="yes" report_changes="yes">/root/.profile</directories>
    <directories check_all="yes" report_changes="yes">/root/.bash*</directories>
    <directories check_all="yes" report_changes="yes">/root/.zsh*</directories>
    <directories check_all="yes" report_changes="yes">/root/.config/fish</directories>
  </syscheck>
</agent_config>
